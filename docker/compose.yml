services:
  dept-tracker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ../data:/data
    environment:
      - DATA_DIR=/data
      - STATIC_DIR=/app/static
      - RUST_LOG=info
      - AUTH_USERNAME=${AUTH_USERNAME:-}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
